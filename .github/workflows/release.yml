name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip -r LeadingTiger9.ReusableKeyCard.zip \
            manifest.json \
            project.json \
            content/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LeadingTiger9.ReusableKeyCard.zip